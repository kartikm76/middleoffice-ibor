name: Deploy to Railway

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railwayapp/deploy-action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: ibor-analyst
          environment: production

  logs:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: View Railway Logs
        run: echo "Deployment complete. View logs at https://railway.app"
