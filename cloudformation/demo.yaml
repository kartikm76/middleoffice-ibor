AWSTemplateFormatVersion: '2010-09-09'
Description: 'IBOR Analyst Demo Stack - Minimal, Single-AZ, Cheapest Config'

Parameters:
  DBPassword:
    Type: String
    NoEcho: true
    Description: Database password (min 8 chars)
    MinLength: 8

  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key

  ContainerRegistry:
    Type: String
    Default: 'kartikm76'
    Description: Docker Hub username or ECR repo

Resources:
  # ─── VPC (Single AZ, Public Subnet Only) ───
  DemoVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: ibor-demo-vpc

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DemoVpc
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ibor-demo-subnet

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ibor-demo-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref DemoVpc
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DemoVpc
      Tags:
        - Key: Name
          Value: ibor-demo-rt

  Route:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # ─── Security Groups ───
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB security group
      VpcId: !Ref DemoVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ibor-demo-alb-sg

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks security group
      VpcId: !Ref DemoVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: ibor-demo-ecs-sg

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS security group
      VpcId: !Ref DemoVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsSecurityGroup
      Tags:
        - Key: Name
          Value: ibor-demo-rds-sg

  # ─── RDS (Single db.t3.micro, No backup retention) ───
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Demo DB subnet
      SubnetIds:
        - !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: ibor-demo-db-subnet

  IborDatabase:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: ibor-demo-db
      Engine: postgres
      EngineVersion: '16.1'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      StorageType: gp3
      DBName: ibordb
      MasterUsername: postgres
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      MultiAZ: false
      BackupRetentionPeriod: 1
      StorageEncrypted: false
      Tags:
        - Key: Name
          Value: ibor-demo-db

  # ─── CloudWatch Logs ───
  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/ibor-demo
      RetentionInDays: 3

  # ─── ECS Cluster ───
  IborCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: ibor-demo-cluster
      Tags:
        - Key: Name
          Value: ibor-demo-cluster

  # ─── IAM Roles ───
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Policies:
        - PolicyName: LogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !GetAtt EcsLogGroup.Arn

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'

  # ─── ECS Task Definitions ───
  PythonTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: ibor-demo-python
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: python
          Image: !Sub '${ContainerRegistry}/ibor-ai-gateway:latest'
          PortMappings:
            - ContainerPort: 8000
          Environment:
            - Name: PG_DSN
              Value: !Sub 'postgresql://postgres:${DBPassword}@${IborDatabase.Endpoint.Address}:5432/ibordb'
          Secrets:
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:ibor-demo/anthropic-key'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref EcsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: python

  JavaTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: ibor-demo-java
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: java
          Image: !Sub '${ContainerRegistry}/ibor-middleware:latest'
          PortMappings:
            - ContainerPort: 8080
          Environment:
            - Name: SPRING_DATASOURCE_URL
              Value: !Sub 'jdbc:postgresql://${IborDatabase.Endpoint.Address}:5432/ibordb'
            - Name: SPRING_DATASOURCE_USERNAME
              Value: postgres
          Secrets:
            - Name: SPRING_DATASOURCE_PASSWORD
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:ibor-demo/db-password'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref EcsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: java

  # ─── ALB ───
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: ibor-demo-alb
      Type: application
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnet
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: ibor-demo-alb

  PythonTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: ibor-demo-python-tg
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref DemoVpc
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5

  JavaTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: ibor-demo-java-tg
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref DemoVpc
      HealthCheckPath: /actuator/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref PythonTargetGroup

  PythonLoadBalancerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          Values: ['/analyst/*']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref PythonTargetGroup

  JavaLoadBalancerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbListener
      Priority: 2
      Conditions:
        - Field: path-pattern
          Values: ['/api/*']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref JavaTargetGroup

  # ─── ECS Services (1 task each, no redundancy) ───
  PythonService:
    Type: AWS::ECS::Service
    DependsOn: PythonLoadBalancerRule
    Properties:
      ServiceName: ibor-demo-python
      Cluster: !Ref IborCluster
      TaskDefinition: !Ref PythonTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet
          SecurityGroups:
            - !Ref EcsSecurityGroup
      LoadBalancers:
        - ContainerName: python
          ContainerPort: 8000
          TargetGroupArn: !Ref PythonTargetGroup

  JavaService:
    Type: AWS::ECS::Service
    DependsOn: JavaLoadBalancerRule
    Properties:
      ServiceName: ibor-demo-java
      Cluster: !Ref IborCluster
      TaskDefinition: !Ref JavaTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet
          SecurityGroups:
            - !Ref EcsSecurityGroup
      LoadBalancers:
        - ContainerName: java
          ContainerPort: 8080
          TargetGroupArn: !Ref JavaTargetGroup

  # ─── S3 for Frontend (Optional) ───
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ibor-demo-ui-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Suspended
      Tags:
        - Key: Name
          Value: ibor-demo-frontend

Outputs:
  LoadBalancerDnsName:
    Description: ALB DNS Name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: ibor-demo-alb-dns

  DatabaseEndpoint:
    Description: RDS Endpoint
    Value: !GetAtt IborDatabase.Endpoint.Address
    Export:
      Name: ibor-demo-db-endpoint

  S3BucketName:
    Description: S3 bucket for frontend
    Value: !Ref FrontendBucket
    Export:
      Name: ibor-demo-s3-bucket
