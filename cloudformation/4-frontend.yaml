AWSTemplateFormatVersion: '2010-09-09'
Description: 'IBOR Analyst React Frontend (S3 + CloudFront)'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development

  ApiEndpoint:
    Type: String
    Description: Backend API endpoint (ALB DNS name from ECS stack)
    Default: 'http://localhost'

Resources:
  # S3 Bucket for Frontend
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ibor-${Environment}-frontend-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub 'ibor-${Environment}-frontend'

  # S3 Bucket Policy for CloudFront
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyText:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: 's3:GetObject'
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution.Id}'

  # CloudFront Origin Access Control
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'ibor-${Environment}-oac'
        OriginAccessControlType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        DefaultRootObject: index.html
        Comment: !Sub 'IBOR ${Environment} Frontend'
        Origins:
          - DomainName: !GetAtt FrontendBucket.RegionalDomainName
            Id: s3-frontend
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          TargetOriginId: s3-frontend
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
          OriginRequestPolicyId: 216adef5-5c7f-47e4-b989-5492eafa07d3  # Managed-CORS-S3Origin
        CacheBehaviors:
          - PathPattern: '/index.html'
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            TargetOriginId: s3-frontend
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea3d-c35d-46eb-81d7-reeSqmkwhJ4  # Managed-CachingDisabled (no-cache index.html)
        ErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        Tags:
          - Key: Name
            Value: !Sub 'ibor-${Environment}-cloudfront'

  # Alias Record in Route 53 (optional - requires domain)
  # Uncomment if you have a Route53 hosted zone
  # FrontendDNS:
  #   Type: AWS::Route53::RecordSet
  #   Properties:
  #     HostedZoneId: !Ref HostedZoneId
  #     Name: !Sub 'app-${Environment}.ibor.internal'
  #     Type: A
  #     AliasTarget:
  #       HostedZoneId: Z2FDTNDATAQYW2  # CloudFront Hosted Zone ID
  #       DNSName: !GetAtt CloudFrontDistribution.DomainName
  #       EvaluateTargetHealth: false

Outputs:
  FrontendBucketName:
    Description: S3 bucket name for frontend
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub 'ibor-${Environment}-frontend-bucket'

  CloudFrontDomainName:
    Description: CloudFront distribution domain
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub 'ibor-${Environment}-cloudfront-domain'

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub 'ibor-${Environment}-cloudfront-id'

  S3DeployCommand:
    Description: Command to deploy frontend to S3
    Value: !Sub 'aws s3 sync ./ibor-ui/dist s3://${FrontendBucket}/ --delete'

  InvalidateCacheCommand:
    Description: Command to invalidate CloudFront cache
    Value: !Sub 'aws cloudfront create-invalidation --distribution-id ${CloudFrontDistribution} --paths "/*"'
