services:
  # ─── PostgreSQL with pgvector + IBOR schema ───
  postgres:
    build:
      context: ./ibor-db
      dockerfile: Dockerfile
    container_name: ibor-postgres
    environment:
      POSTGRES_DB: ibor
      POSTGRES_USER: ibor
      POSTGRES_PASSWORD: ibor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ibor-network

  # ─── Bootstrap Job (waits for Postgres, loads schema + CSV data) ───
  bootstrap:
    build:
      context: .
      dockerfile: ibor-starter-docker/Dockerfile.bootstrap
    container_name: ibor-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONTAINER: ibor-postgres
      DB_NAME: ibor
      DB_USER: ibor
    restart: "no"
    networks:
      - ibor-network

  # ─── Java Spring Boot Middleware ───
  ibor-middleware:
    build:
      context: ./ibor-middleware
      dockerfile: Dockerfile
    container_name: ibor-middleware
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ibor
      SPRING_DATASOURCE_USERNAME: ibor
      SPRING_DATASOURCE_PASSWORD: ibor
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - ibor-network

  # ─── Python FastAPI AI Gateway ───
  ibor-ai-gateway:
    build:
      context: ./ibor-ai-gateway
      dockerfile: Dockerfile
    container_name: ibor-ai-gateway
    environment:
      PG_DSN: postgresql://ibor:ibor@postgres:5432/ibor
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-placeholder}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - ibor-network

  # ─── React UI (Nginx) ───
  ibor-ui:
    build:
      context: ./ibor-ui
      dockerfile: Dockerfile
    container_name: ibor-ui
    ports:
      - "5173:5173"
    depends_on:
      ibor-middleware:
        condition: service_healthy
      ibor-ai-gateway:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - ibor-network

networks:
  ibor-network:
    driver: bridge

volumes:
  pgdata: