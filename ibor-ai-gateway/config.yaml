# =====================================================================
# IBOR AI Gateway Configuration
# All model configurations, API endpoints, and database settings
# =====================================================================

# ── IBOR Spring Boot API ──────────────────────────────────────────
ibor:
  api_base: http://localhost:8080/api
  verify_ssl: true

# ── LLM Models (Claude for reasoning) ──────────────────────────────
llm:
  provider: anthropic
  primary:
    name: claude-sonnet-4-6
    provider: anthropic
    purpose: "Primary reasoning engine for intent parsing + synthesis"
    max_tokens: 4000
    temperature: 0.7
    capabilities: ["tool_calling", "extended_thinking", "vision"]

  fallback:
    name: claude-opus-4-6
    provider: anthropic
    purpose: "Fallback for complex reasoning (higher cost)"
    max_tokens: 4000
    temperature: 0.5

# ── Embedding Models (for RAG) ────────────────────────────────────
embeddings:
  provider: openai
  primary:
    name: text-embedding-3-small
    provider: openai
    purpose: "Fast, cost-effective embeddings for conversation RAG"
    dimension: 1536
    batch_size: 50
    cost_per_1m_tokens: 0.02

  alternatives:
    - name: text-embedding-3-large
      provider: openai
      purpose: "Higher quality (slower, more expensive)"
      dimension: 3072
      cost_per_1m_tokens: 0.13

    - name: sentence-transformers (local)
      provider: open-source
      purpose: "Local embeddings (no API calls, lower quality)"
      dimension: 384
      cost_per_1m_tokens: 0

# ── Database ──────────────────────────────────────────────────────
database:
  dsn: postgresql://ibor:ibor@localhost:5432/ibor
  pool_size: 10
  timeout_secs: 30
  vector_index_type: ivfflat
  similarity_metric: cosine  # [cosine, euclidean, ip]

# ── Market Data (yfinance) ────────────────────────────────────────
market:
  provider: yfinance
  tools:
    - get_market_snapshot
    - get_news
    - get_earnings
    - get_macro_snapshot

# ── RAG Configuration ─────────────────────────────────────────────
rag:
  conversation_embedding:
    enabled: true
    schedule_minutes: 5
    top_k_similar: 3
    min_similarity_threshold: 0.65

  document_embedding:
    enabled: false  # Phase 3+
    schedule_minutes: 60
    top_k_similar: 5

# ── Environment & Secrets ─────────────────────────────────────────
# Secrets must be set via environment variables or .env file:
# - ANTHROPIC_API_KEY
# - OPENAI_API_KEY
# - PG_DSN (optional, overrides database.dsn above)
# Never add secret values directly in this file.
