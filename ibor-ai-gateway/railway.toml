# ibor-ai-gateway deployment configuration
# FastAPI service for AI-powered IBOR analysis

[build]
builder = "RAILPACK"
buildCommand = "uv sync --frozen"

[deploy]
startCommand = "uv run uvicorn ai_gateway.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
