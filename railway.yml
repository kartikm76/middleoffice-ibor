# ─────────────────────────────────────────────────────────────────────────────
# Railway.app Deployment Configuration
# https://docs.railway.app/reference/railway-json
# ─────────────────────────────────────────────────────────────────────────────

# Global settings
$schema: https://railway.app/railway.schema.json

services:
  # PostgreSQL 16 with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ibor
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ibor
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthCheck:
      test: ["CMD-SHELL", "pg_isready -U ibor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot IBOR Middleware
  ibor-middleware:
    build:
      context: ./ibor-middleware
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      # Database
      SPRING_DATASOURCE_URL: ${{ services.postgres.DATABASE_URL }}/ibor
      SPRING_DATASOURCE_USERNAME: ibor
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      # Server
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: production

      # Logging
      LOGGING_LEVEL_COM_KMAKKER_IBOR: INFO
    ports:
      - 8080:8080
    healthCheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI AI Gateway (Python)
  ibor-ai-gateway:
    build:
      context: ./ibor-ai-gateway
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - ibor-middleware
    environment:
      # Database
      PG_DSN: ${{ services.postgres.DATABASE_URL }}/ibor

      # API Keys
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Service configuration
      STRUCTURED_API_BASE: http://ibor-middleware:8080/api
      VERIFY_SSL: "false"
      ANTHROPIC_MODEL: claude-opus-4-6

      # Security — Rate Limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_RPM: "30"

      # Security — Authentication (Email Whitelist for closed beta)
      EMAIL_WHITELIST_ENABLED: "true"
      EMAIL_WHITELIST: ${{ secrets.EMAIL_WHITELIST }}

      # Security — Quotas
      MAX_QUESTIONS_PER_DAY: "100"
      MAX_TOKENS_PER_DAY: "500000"

      # Security — Cost Controls
      COST_TRACKING_ENABLED: "true"
      MAX_DAILY_SPEND_USD: "50.0"

      # Security — Input Validation
      MAX_QUESTION_LENGTH: "2000"
      MIN_QUESTION_LENGTH: "10"

      # Security — Monitoring
      LOG_ALL_REQUESTS: "true"
      ALERT_ON_QUOTA_VIOLATION: "true"

      # Environment
      ENVIRONMENT: beta
    ports:
      - 8000:8000
    healthCheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React UI
  ibor-ui:
    build:
      context: ./ibor-ui
      dockerfile: Dockerfile
    depends_on:
      - ibor-ai-gateway
    environment:
      VITE_API_URL: http://ibor-ai-gateway:8000
    ports:
      - 5173:5173
    healthCheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3

# Volumes (persistent storage)
volumes:
  postgres_data:
    driver: local

# Network configuration (all services can communicate on internal network)
networks:
  default:
    name: ibor-network
    driver: bridge

# Secrets (must be set in Railway dashboard or via CLI)
# railway variables set POSTGRES_PASSWORD=... ANTHROPIC_API_KEY=... EMAIL_WHITELIST=...
