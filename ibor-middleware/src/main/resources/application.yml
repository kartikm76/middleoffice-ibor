server:
  port: 8080
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ibor}
    username: ${DB_USER:ibor}
    password: ${DB_PASSWORD:ibor}
    hikari:
      maximum-pool-size: 25  # Increased from default 10 for concurrent requests
      minimum-idle: 5
      connection-timeout: 10000  # 10 seconds
      idle-timeout: 600000  # 10 minutes
      max-lifetime: 1800000  # 30 minutes
  jooq:
    sql-dialect: POSTGRES
openai:
  api-key: ${OPENAI_API_KEY:XXXX}
  baseUrl: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  chatModel: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
  embedModel: ${OPENAI_EMBED_MODEL:text-embedding-3-small}
rag:
  topK: 6
  chunkChars: 1000
  chunkOverlap: 150

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: false
logging:
  level:
    com.kmakker.ibor.jodi: DEBUG
